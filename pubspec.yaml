name: flutter_sync
description: The most powerful offline-first sync engine for Flutter — multi-backend, CRDT, HLC, background sync on all platforms.
version: 0.1.0
repository: https://github.com/your-org/flutter_sync
homepage: https://fluttersync.dev
issue_tracker: https://github.com/your-org/flutter_sync/issues
documentation: https://fluttersync.dev/docs
# Apache-2.0 license declared via the LICENSE file at repository root.

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Local storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Encryption
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2

  # Networking and backends
  http: ^1.2.1
  web_socket_channel: ^3.0.3
  supabase_flutter: ^2.5.0
  cloud_firestore: ^5.0.0
  firebase_core: ^3.0.0
  graphql: ^5.1.3
  grpc: ^3.2.4
  protobuf: ^3.1.0

  # Background sync
  workmanager: ^0.5.2
  background_fetch: ^1.2.2

  # Connectivity
  connectivity_plus: ^6.0.3

  # Utilities
  uuid: ^4.4.0
  collection: ^1.18.0
  rxdart: ^0.27.7
  meta: ^1.11.0
  logging: ^1.2.0
  crypto: ^3.0.3
  convert: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
